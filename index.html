<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <div id="app">
      <main class="todo-app">
        <header class="todo-header">
          <h1 class="todo-title">Todo List</h1>
        </header>

        <p class="todo-status todo-status--hidden" role="status" aria-live="polite"></p>
        <div class="todo-load-row">
          <p class="todo-loading todo-loading--hidden" aria-live="polite">Loading todos…</p>
          <button type="button" class="todo-retry-button todo-retry-button--hidden">
            Retry loading
          </button>
        </div>

        <form class="todo-form" autocomplete="off">
          <label class="todo-label" for="todo-input">New task</label>
          <div class="todo-form-row">
            <input
              class="todo-input"
              id="todo-input"
              name="todo"
              type="text"
              placeholder="What needs doing?"
              maxlength="500"
            />
            <button class="todo-add-button" type="submit">Add</button>
          </div>
          <div class="todo-form-row todo-form-row--options">
            <div class="todo-field">
              <label class="todo-label" for="todo-category">Category</label>
              <select class="todo-category-select" id="todo-category" name="category">
                <option value="work" selected>Work</option>
                <option value="personal">Personal</option>
                <option value="errands">Errands</option>
              </select>
            </div>
            <div class="todo-field">
              <label class="todo-label" for="todo-priority">Priority</label>
              <select class="todo-priority-select" id="todo-priority" name="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="todo-field">
              <label class="todo-label" for="todo-due-date">Due date</label>
              <input
                class="todo-due-date"
                id="todo-due-date"
                name="due_date"
                type="date"
                placeholder="mm/dd/yyyy"
                title="Due date (mm/dd/yyyy)"
              />
            </div>
          </div>
        </form>

        <ul class="todo-list" aria-label="Tasks"></ul>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
