<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Philatelist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Special+Elite&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <main class="todo-app">
        <header class="todo-header">
          <div class="todo-header-top">
            <div class="todo-brand">
              <div class="todo-brand-mark" aria-hidden="true">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2" />
                  <circle cx="32" cy="32" r="24" stroke="currentColor" stroke-width="0.75" opacity="0.6" />
                  <text
                    x="32"
                    y="29"
                    text-anchor="middle"
                    fill="currentColor"
                    font-family="Special Elite, serif"
                    font-size="7"
                    letter-spacing="0.05em"
                  >
                    EST.
                  </text>
                  <text
                    x="32"
                    y="40"
                    text-anchor="middle"
                    fill="currentColor"
                    font-family="Special Elite, serif"
                    font-size="11"
                  >
                    2026
                  </text>
                </svg>
              </div>
              <div class="todo-brand-text">
                <h1 class="todo-title">The Philatelist</h1>
                <p class="todo-subtitle">A collection of important things</p>
              </div>
            </div>

            <div class="todo-auth todo-auth--header" aria-label="Account">
              <div class="todo-auth-signed-in todo-auth-signed-in--hidden">
                <span class="todo-auth-email" aria-live="polite"></span>
                <button type="button" class="todo-auth-sign-out">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                  <span>Sign out</span>
                </button>
              </div>

              <div class="todo-auth-guest">
                <div class="todo-auth-header-actions" role="group" aria-label="Account">
                  <button
                    type="button"
                    class="todo-auth-header-btn"
                    data-open-auth="signin"
                    aria-haspopup="dialog"
                    aria-controls="todo-auth-dialog"
                  >
                    Sign in
                  </button>
                  <button
                    type="button"
                    class="todo-auth-header-btn"
                    data-open-auth="signup"
                    aria-haspopup="dialog"
                    aria-controls="todo-auth-dialog"
                  >
                    Create account
                  </button>
                </div>
              </div>
            </div>
          </div>
        </header>

        <p class="todo-status todo-status--hidden" role="status" aria-live="polite"></p>
        <div class="todo-load-row">
          <p class="todo-loading todo-loading--hidden" aria-live="polite">Loading stamps…</p>
          <button type="button" class="todo-retry-button todo-retry-button--hidden">Retry loading</button>
        </div>

        <section class="todo-stamp-press" aria-labelledby="stamp-press-heading">
          <div class="todo-stamp-press-inner">
            <span class="todo-stamp-press-chip" id="stamp-press-heading">Create a new stamp</span>
            <form class="todo-form" autocomplete="off">
              <div class="todo-form-main">
                <div class="todo-form-input-wrap">
                  <label class="todo-label todo-label--sr" for="todo-input">What needs doing?</label>
                  <input
                    class="todo-input"
                    id="todo-input"
                    name="task_title"
                    type="text"
                    autocomplete="off"
                    placeholder="What needs doing?"
                    maxlength="500"
                  />
                </div>
                <div class="todo-add-button-wrap">
                  <button class="todo-add-button" type="button">Create</button>
                </div>
              </div>
              <div class="todo-form-row todo-form-row--options">
                <div class="todo-field">
                  <label class="todo-label" for="todo-category">Category</label>
                  <select class="todo-category-select" id="todo-category" name="category">
                    <option value="work" selected>Work</option>
                    <option value="personal">Personal</option>
                    <option value="groceries">Groceries</option>
                  </select>
                </div>
                <div class="todo-field">
                  <label class="todo-label" for="todo-priority">Priority</label>
                  <select class="todo-priority-select" id="todo-priority" name="priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                  </select>
                </div>
                <div class="todo-field">
                  <label class="todo-label" for="todo-due-date">Due date</label>
                  <div class="todo-due-date-wrap">
                    <input
                      class="todo-due-date"
                      id="todo-due-date"
                      name="due_date"
                      type="date"
                      required
                      title="Due date (required)"
                    />
                  </div>
                </div>
              </div>
            </form>
          </div>
        </section>

        <nav class="todo-filter-bar" aria-label="Filter and sort stamps">
          <div class="todo-filter-group">
            <span class="todo-filter-label">Show</span>
            <button type="button" class="todo-filter-btn todo-filter-btn--active" data-filter="all">
              <span class="todo-filter-dot todo-filter-dot--all" aria-hidden="true"></span>
              All stamps
            </button>
            <button type="button" class="todo-filter-btn" data-filter="work">
              <span class="todo-filter-dot todo-filter-dot--work" aria-hidden="true"></span>
              Work
            </button>
            <button type="button" class="todo-filter-btn" data-filter="personal">
              <span class="todo-filter-dot todo-filter-dot--personal" aria-hidden="true"></span>
              Personal
            </button>
            <button type="button" class="todo-filter-btn" data-filter="groceries">
              <span class="todo-filter-dot todo-filter-dot--groceries" aria-hidden="true"></span>
              Groceries
            </button>
          </div>
          <div class="todo-sort">
            <label for="todo-sort">Sort by</label>
            <select class="todo-sort-select" id="todo-sort" aria-label="Sort stamps">
              <option value="due" selected>Due date</option>
              <option value="priority">Priority</option>
              <option value="created">Created</option>
            </select>
          </div>
        </nav>

        <ul class="todo-list" aria-label="Stamps"></ul>

        <dialog class="todo-auth-dialog" id="todo-auth-dialog" aria-labelledby="todo-auth-dialog-title">
          <div class="todo-auth-dialog-surface">
            <div class="todo-auth-dialog-head">
              <h2 id="todo-auth-dialog-title" class="todo-auth-dialog-title">Account</h2>
              <button type="button" class="todo-auth-dialog-close" aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>
            <div class="todo-auth-tabs" role="tablist" aria-label="Account options">
              <button
                type="button"
                class="todo-auth-tab todo-auth-tab--active"
                role="tab"
                aria-selected="true"
                data-panel="signup"
                id="todo-auth-tab-signup"
              >
                Create account
              </button>
              <button
                type="button"
                class="todo-auth-tab"
                role="tab"
                aria-selected="false"
                data-panel="signin"
                id="todo-auth-tab-signin"
              >
                Sign in
              </button>
            </div>

            <form
              class="todo-auth-form todo-auth-signup-form"
              id="todo-auth-signup-form"
              role="tabpanel"
              aria-labelledby="todo-auth-tab-signup"
              autocomplete="off"
            >
              <div class="todo-auth-fields">
                <div class="todo-field">
                  <label class="todo-label" for="todo-auth-signup-email">Email</label>
                  <input
                    class="todo-input todo-auth-input"
                    id="todo-auth-signup-email"
                    name="email"
                    type="email"
                    required
                    autocomplete="email"
                  />
                </div>
                <div class="todo-field">
                  <label class="todo-label" for="todo-auth-signup-password">Password</label>
                  <input
                    class="todo-input todo-auth-input"
                    id="todo-auth-signup-password"
                    name="password"
                    type="password"
                    required
                    minlength="6"
                    autocomplete="new-password"
                  />
                </div>
              </div>
              <button type="submit" class="todo-auth-submit">Create account</button>
            </form>

            <form
              class="todo-auth-form todo-auth-signin-form todo-auth-form--hidden"
              id="todo-auth-signin-form"
              role="tabpanel"
              aria-labelledby="todo-auth-tab-signin"
              autocomplete="off"
            >
              <div class="todo-auth-fields">
                <div class="todo-field">
                  <label class="todo-label" for="todo-auth-signin-email">Email</label>
                  <input
                    class="todo-input todo-auth-input"
                    id="todo-auth-signin-email"
                    name="email"
                    type="email"
                    required
                    autocomplete="email"
                  />
                </div>
                <div class="todo-field">
                  <label class="todo-label" for="todo-auth-signin-password">Password</label>
                  <input
                    class="todo-input todo-auth-input"
                    id="todo-auth-signin-password"
                    name="password"
                    type="password"
                    required
                    autocomplete="current-password"
                  />
                </div>
              </div>
              <button type="submit" class="todo-auth-submit">Sign in</button>
            </form>
          </div>
        </dialog>

        <footer class="todo-footer-hint">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="4" y="3" width="16" height="18" rx="1" stroke="currentColor" stroke-width="1.25" stroke-dasharray="2 2" />
            <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1" />
            <path d="M8 16h8" stroke="currentColor" stroke-width="1" stroke-linecap="round" />
          </svg>
          <p>
            Tap a stamp to complete it. Long press (or the menu) for more options.
          </p>
        </footer>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
