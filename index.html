<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <div id="app">
      <main class="todo-app">
        <header class="todo-header">
          <h1 class="todo-title">Todo List</h1>

          <div class="todo-auth" aria-label="Account">
            <div class="todo-auth-signed-in todo-auth-signed-in--hidden">
              <span class="todo-auth-email" aria-live="polite"></span>
              <button type="button" class="todo-auth-sign-out">Sign out</button>
            </div>

            <div class="todo-auth-guest">
              <p class="todo-auth-guest-intro">Use a guest session, or create an account to keep tasks on this device.</p>
              <div class="todo-auth-tabs" role="tablist" aria-label="Account options">
                <button
                  type="button"
                  class="todo-auth-tab todo-auth-tab--active"
                  role="tab"
                  aria-selected="true"
                  data-panel="signup"
                  id="todo-auth-tab-signup"
                >
                  Create account
                </button>
                <button
                  type="button"
                  class="todo-auth-tab"
                  role="tab"
                  aria-selected="false"
                  data-panel="signin"
                  id="todo-auth-tab-signin"
                >
                  Sign in
                </button>
              </div>

              <form
                class="todo-auth-form todo-auth-signup-form"
                id="todo-auth-signup-form"
                role="tabpanel"
                aria-labelledby="todo-auth-tab-signup"
                autocomplete="off"
              >
                <div class="todo-auth-fields">
                  <div class="todo-field">
                    <label class="todo-label" for="todo-auth-signup-email">Email</label>
                    <input
                      class="todo-input todo-auth-input"
                      id="todo-auth-signup-email"
                      name="email"
                      type="email"
                      required
                      autocomplete="email"
                    />
                  </div>
                  <div class="todo-field">
                    <label class="todo-label" for="todo-auth-signup-password">Password</label>
                    <input
                      class="todo-input todo-auth-input"
                      id="todo-auth-signup-password"
                      name="password"
                      type="password"
                      required
                      minlength="6"
                      autocomplete="new-password"
                    />
                  </div>
                </div>
                <button type="submit" class="todo-auth-submit">Create account</button>
              </form>

              <form
                class="todo-auth-form todo-auth-signin-form todo-auth-form--hidden"
                id="todo-auth-signin-form"
                role="tabpanel"
                aria-labelledby="todo-auth-tab-signin"
                autocomplete="off"
              >
                <div class="todo-auth-fields">
                  <div class="todo-field">
                    <label class="todo-label" for="todo-auth-signin-email">Email</label>
                    <input
                      class="todo-input todo-auth-input"
                      id="todo-auth-signin-email"
                      name="email"
                      type="email"
                      required
                      autocomplete="email"
                    />
                  </div>
                  <div class="todo-field">
                    <label class="todo-label" for="todo-auth-signin-password">Password</label>
                    <input
                      class="todo-input todo-auth-input"
                      id="todo-auth-signin-password"
                      name="password"
                      type="password"
                      required
                      autocomplete="current-password"
                    />
                  </div>
                </div>
                <button type="submit" class="todo-auth-submit">Sign in</button>
              </form>
            </div>
          </div>
        </header>

        <p class="todo-status todo-status--hidden" role="status" aria-live="polite"></p>
        <div class="todo-load-row">
          <p class="todo-loading todo-loading--hidden" aria-live="polite">Loading todos…</p>
          <button type="button" class="todo-retry-button todo-retry-button--hidden">
            Retry loading
          </button>
        </div>

        <form class="todo-form" autocomplete="off">
          <label class="todo-label" for="todo-input">New task</label>
          <div class="todo-form-row">
            <input
              class="todo-input"
              id="todo-input"
              name="task_title"
              type="text"
              autocomplete="off"
              placeholder="What needs doing?"
              maxlength="500"
            />
            <button class="todo-add-button" type="button">Add</button>
          </div>
          <div class="todo-form-row todo-form-row--options">
            <div class="todo-field">
              <label class="todo-label" for="todo-category">Category</label>
              <select class="todo-category-select" id="todo-category" name="category">
                <option value="work" selected>Work</option>
                <option value="personal">Personal</option>
                <option value="errands">Errands</option>
              </select>
            </div>
            <div class="todo-field">
              <label class="todo-label" for="todo-priority">Priority</label>
              <select class="todo-priority-select" id="todo-priority" name="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="todo-field">
              <label class="todo-label" for="todo-due-date">Due date</label>
              <input
                class="todo-due-date"
                id="todo-due-date"
                name="due_date"
                type="date"
                required
                placeholder="mm/dd/yyyy"
                title="Due date (required)"
              />
            </div>
          </div>
        </form>

        <ul class="todo-list" aria-label="Tasks"></ul>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
